<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CivicPulse — Telangana Smart Complaint Management</title>
  <meta name="description"
    content="CivicPulse: Smart civic complaint management for Telangana citizens and administrators. Report issues, track resolution, and manage city services efficiently." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="locations.js"></script>
  <style>
    /* ── Reset & Tokens ─────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0f172a;
      --primary2: #1e293b;
      --accent: #14b8a6;
      --accent2: #0891b2;
      --accent3: #f59e0b;
      --accent4: #ef4444;
      --admin-color: #6366f1;
      --citizen-color: #14b8a6;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --surface3: #f1f5f9;
      --border: rgba(0, 0, 0, 0.07);
      --border2: rgba(0, 0, 0, 0.14);
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 4px 16px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.10);
      --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.15);
      --font: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --sidebar-w: 268px;
      --header-h: 64px;
      --transition: 0.2s cubic-bezier(.4, 0, .2, 1);
    }

    [data-dark] {
      --primary: #060612;
      --primary2: #0f0f1a;
      --surface: #111827;
      --surface2: #1a2035;
      --surface3: #1f2937;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.13);
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #475569;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.4), 0 4px 16px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
      --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    html,
    body {
      height: 100%;
      font-family: var(--font);
      background: var(--surface3);
      color: var(--text);
      transition: background var(--transition), color var(--transition);
    }

    #root {
      height: 100%;
    }

    input,
    select,
    textarea,
    button {
      font-family: var(--font);
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 99px;
    }

    /* ── Animations ─────────────────────────────────────────────────── */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-16px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(16px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes shimmer {
      from {
        background-position: -200% 0
      }

      to {
        background-position: 200% 0
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-8px)
      }
    }

    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(20, 184, 166, 0.3)
      }

      50% {
        box-shadow: 0 0 40px rgba(20, 184, 166, 0.6)
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease forwards;
    }

    .scale-in {
      animation: scaleIn 0.3s ease forwards;
    }

    .slide-left {
      animation: slideInLeft 0.35s ease forwards;
    }

    .slide-right {
      animation: slideInRight 0.35s ease forwards;
    }

    /* ── Toast ──────────────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 18px;
      font-size: 13.5px;
      box-shadow: var(--shadow-xl);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.3s ease;
      max-width: 340px;
    }

    .toast .toast-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .toast.success {
      border-left: 3px solid var(--accent);
    }

    .toast.success .toast-icon {
      background: rgba(20, 184, 166, 0.15);
      color: var(--accent);
    }

    .toast.error {
      border-left: 3px solid var(--accent4);
    }

    .toast.error .toast-icon {
      background: rgba(239, 68, 68, 0.15);
      color: var(--accent4);
    }

    .toast.info {
      border-left: 3px solid var(--accent2);
    }

    .toast.info .toast-icon {
      background: rgba(8, 145, 178, 0.15);
      color: var(--accent2);
    }

    /* ── Auth — Premium Split Screen ────────────────────────────────── */
    .auth-bg {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    @media (max-width: 900px) {
      .auth-bg {
        grid-template-columns: 1fr;
      }
    }

    /* LEFT — Hero Panel */
    .auth-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1a3a4a 40%, #0c2233 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 56px;
      color: #fff;
    }

    .auth-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 20%, rgba(20, 184, 166, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(8, 145, 178, 0.12) 0%, transparent 60%);
    }

    .auth-hero-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(20, 184, 166, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 184, 166, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .auth-logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }

    .auth-logo-icon {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, #14b8a6, #0891b2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(20, 184, 166, 0.4);
      animation: glow 3s ease-in-out infinite;
    }

    .auth-logo-name {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .auth-logo-name span {
      color: #14b8a6;
    }

    .auth-hero-title {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .auth-hero-title .highlight {
      color: #14b8a6;
    }

    .auth-hero-sub {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.7;
      margin-bottom: 44px;
      position: relative;
      z-index: 1;
      max-width: 380px;
    }

    .auth-features {
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .auth-feature {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .auth-feature-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .auth-feature-text {
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.75);
    }

    .auth-feature-text strong {
      color: #fff;
      display: block;
      font-size: 14px;
      margin-bottom: 1px;
    }

    .auth-districts-badge {
      margin-top: 44px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(20, 184, 166, 0.15);
      border: 1px solid rgba(20, 184, 166, 0.3);
      border-radius: 99px;
      padding: 10px 18px;
      font-size: 13px;
      color: #14b8a6;
      position: relative;
      z-index: 1;
      width: fit-content;
    }

    .auth-floating-card {
      position: absolute;
      right: -20px;
      bottom: 80px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      padding: 16px 20px;
      width: 200px;
      animation: float 4s ease-in-out infinite;
    }

    .auth-float-stat {
      font-size: 28px;
      font-weight: 800;
      color: #14b8a6;
    }

    .auth-float-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 2px;
    }

    /* RIGHT — Auth Form Panel */
    .auth-form-panel {
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 56px;
      overflow-y: auto;
    }

    @media (max-width: 900px) {
      .auth-hero {
        display: none;
      }

      .auth-form-panel {
        padding: 40px 28px;
      }
    }

    .auth-form-inner {
      width: 100%;
      max-width: 420px;
    }

    .auth-welcome {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .auth-welcome-sub {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 32px;
    }

    /* Role Selector */
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .role-btn {
      border: 2px solid var(--border2);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: var(--surface2);
      position: relative;
      overflow: hidden;
    }

    .role-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .role-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .role-btn.admin-role {}

    .role-btn.citizen-role {}

    .role-btn.active.admin-role {
      border-color: var(--admin-color);
      background: rgba(99, 102, 241, 0.07);
    }

    .role-btn.active.admin-role::before {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), transparent);
      opacity: 1;
    }

    .role-btn.active.citizen-role {
      border-color: var(--citizen-color);
      background: rgba(20, 184, 166, 0.07);
    }

    .role-btn.active.citizen-role::before {
      background: linear-gradient(135deg, rgba(20, 184, 166, 0.1), transparent);
      opacity: 1;
    }

    .role-btn .role-emoji {
      font-size: 30px;
      margin-bottom: 8px;
      display: block;
    }

    .role-btn .role-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .role-btn .role-desc {
      font-size: 11.5px;
      color: var(--text2);
      margin-top: 3px;
    }

    .role-btn.active.admin-role .role-title {
      color: var(--admin-color);
    }

    .role-btn.active.citizen-role .role-title {
      color: var(--citizen-color);
    }

    /* Auth Tabs */
    .auth-tabs {
      display: flex;
      gap: 2px;
      background: var(--surface3);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text2);
      transition: all var(--transition);
    }

    .auth-tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.1);
    }

    /* Form Elements */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 5px;
      letter-spacing: 0.2px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border2);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--surface2);
      color: var(--text);
      transition: all var(--transition);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.12);
    }

    .form-input::placeholder {
      color: var(--text3);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .form-input {
      padding-right: 42px;
    }

    .input-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text3);
      font-size: 16px;
      background: none;
      border: none;
      padding: 4px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .btn:hover::after {
      opacity: 1;
    }

    .btn-primary {
      background: linear-gradient(135deg, #14b8a6, #0891b2);
      color: #fff;
      box-shadow: 0 4px 14px rgba(20, 184, 166, 0.3);
    }

    .btn-primary::after {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(20, 184, 166, 0.4);
    }

    .btn-admin {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
    }

    .btn-admin:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border2);
    }

    .btn-secondary:hover {
      background: var(--surface3);
      border-color: var(--accent);
    }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    .btn-danger:hover {
      background: #dc2626;
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1.5px solid var(--border2);
    }

    .btn-ghost:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .btn-full {
      width: 100%;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: 12.5px;
    }

    .btn-xs {
      padding: 5px 10px;
      font-size: 11.5px;
      border-radius: 6px;
    }

    /* Demo hint */
    .demo-hint {
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 18px;
      font-size: 12px;
    }

    .demo-hint-title {
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      font-size: 12.5px;
    }

    .demo-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }

    .demo-row span:first-child {
      color: var(--text2);
    }

    .demo-row span:last-child {
      font-family: var(--mono);
      color: var(--accent);
      font-size: 11.5px;
    }

    /* ── App Layout ─────────────────────────────────────────────────── */
    .app-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      position: relative;
      z-index: 10;
      transition: width var(--transition);
    }

    .sidebar-header {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #14b8a6, #0891b2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sidebar-brand-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .sidebar-brand-role {
      font-size: 10.5px;
      color: var(--text3);
      font-weight: 500;
    }

    .sidebar-portal-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 9.5px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .portal-admin {
      background: rgba(99, 102, 241, 0.12);
      color: var(--admin-color);
    }

    .portal-citizen {
      background: rgba(20, 184, 166, 0.12);
      color: var(--citizen-color);
    }

    .sidebar-nav {
      padding: 12px 10px;
      flex: 1;
    }

    .nav-section {
      margin-bottom: 22px;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 0 10px;
      margin-bottom: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      font-size: 13.5px;
      color: var(--text2);
      font-weight: 500;
      margin-bottom: 2px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      position: relative;
    }

    .nav-item:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(20, 184, 166, 0.10);
      color: var(--accent);
      font-weight: 600;
    }

    .nav-item.active.admin-nav {
      background: rgba(99, 102, 241, 0.10);
      color: var(--admin-color);
    }

    .nav-item .nav-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .nav-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 99px;
    }

    .nav-badge-green {
      background: rgba(20, 184, 166, 0.15);
      color: var(--accent);
    }

    .nav-badge-red {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .nav-badge-blue {
      background: rgba(99, 102, 241, 0.15);
      color: var(--admin-color);
    }

    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .avatar-admin {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
    }

    .avatar-citizen {
      background: linear-gradient(135deg, #14b8a6, #0891b2);
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-email {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      padding: 6px 10px;
      font-size: 11.5px;
    }

    /* ── Main Content ───────────────────────────────────────────────── */
    .main {
      flex: 1;
      overflow-y: auto;
      background: var(--surface3);
      display: flex;
      flex-direction: column;
    }

    .page-header {
      padding: 24px 32px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .page-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.4px;
    }

    .page-sub {
      font-size: 13px;
      color: var(--text2);
      margin-top: 2px;
    }

    .page-body {
      padding: 28px 32px;
      flex: 1;
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      padding: 8px;
      cursor: pointer;
      color: var(--text);
      font-size: 20px;
    }

    .overlay-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 9;
      backdrop-filter: blur(3px);
    }

    /* ── Stats Grid ─────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--border);
      transition: all var(--transition);
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      opacity: 0.06;
    }

    .stat-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      font-size: 20px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-change {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
    }

    /* ── Cards ──────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .card-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .card-body {
      padding: 20px;
    }

    /* ── Table ──────────────────────────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    thead tr {
      border-bottom: 1.5px solid var(--border);
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    tbody tr:hover {
      background: var(--surface2);
    }

    td {
      padding: 12px 14px;
      color: var(--text);
      vertical-align: middle;
    }

    td:first-child,
    th:first-child {
      padding-left: 20px;
    }

    /* ── Badges ─────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .badge-pending {
      background: rgba(245, 158, 11, 0.13);
      color: #92400e;
    }

    .badge-progress {
      background: rgba(59, 130, 246, 0.13);
      color: #1d4ed8;
    }

    .badge-resolved {
      background: rgba(20, 184, 166, 0.13);
      color: #0d7a5f;
    }

    .badge-rejected {
      background: rgba(239, 68, 68, 0.12);
      color: #b91c1c;
    }

    .badge-urgent {
      background: rgba(239, 68, 68, 0.13);
      color: #b91c1c;
    }

    .badge-high {
      background: rgba(249, 115, 22, 0.13);
      color: #c2410c;
    }

    .badge-medium {
      background: rgba(234, 179, 8, 0.13);
      color: #92400e;
    }

    .badge-low {
      background: rgba(20, 184, 166, 0.12);
      color: #0d7a5f;
    }

    .badge-roads {
      background: rgba(124, 58, 237, 0.12);
      color: #5b21b6;
    }

    .badge-sanitation {
      background: rgba(20, 184, 166, 0.12);
      color: #0d7a5f;
    }

    .badge-water {
      background: rgba(59, 130, 246, 0.12);
      color: #1d4ed8;
    }

    .badge-electricity {
      background: rgba(245, 158, 11, 0.12);
      color: #92400e;
    }

    .badge-drainage {
      background: rgba(236, 72, 153, 0.12);
      color: #9d174d;
    }

    .badge-parks {
      background: rgba(34, 197, 94, 0.12);
      color: #14532d;
    }

    .badge-noise {
      background: rgba(244, 63, 94, 0.12);
      color: #9f1239;
    }

    .badge-other {
      background: rgba(100, 116, 139, 0.12);
      color: #475569;
    }

    [data-dark] .badge-pending {
      background: rgba(245, 158, 11, 0.2);
      color: #fcd34d;
    }

    [data-dark] .badge-progress {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
    }

    [data-dark] .badge-resolved {
      background: rgba(20, 184, 166, 0.2);
      color: #6ee7c1;
    }

    [data-dark] .badge-urgent {
      background: rgba(239, 68, 68, 0.22);
      color: #fca5a5;
    }

    /* ── Priority ────────────────────────────────────────────────────── */
    .priority-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .dot-urgent {
      background: #ef4444;
      animation: pulse 1.4s infinite;
    }

    .dot-high {
      background: #f97316;
    }

    .dot-medium {
      background: #eab308;
    }

    .dot-low {
      background: #14b8a6;
    }

    /* ── Form Sections ───────────────────────────────────────────────── */
    .form-section {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 20px;
    }

    .form-section-title {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-section-title .fs-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }

    .form-full {
      grid-column: 1/-1;
    }

    textarea.form-input {
      min-height: 100px;
      resize: vertical;
    }

    select.form-input {
      cursor: pointer;
    }

    /* Category Grid */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    .cat-card {
      border: 2px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: var(--surface2);
      position: relative;
      overflow: hidden;
    }

    .cat-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .cat-card.selected {
      border-color: var(--accent);
      background: rgba(20, 184, 166, 0.07);
    }

    .cat-icon {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .cat-name {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--text);
    }

    .cat-dept {
      font-size: 10.5px;
      color: var(--text2);
      margin-top: 2px;
    }

    /* Image Upload */
    .image-upload {
      border: 2px dashed var(--border2);
      border-radius: var(--radius-sm);
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: var(--surface2);
    }

    .image-upload:hover {
      border-color: var(--accent);
      background: rgba(20, 184, 166, 0.04);
    }

    .image-upload input {
      display: none;
    }

    .image-preview-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .image-preview {
      position: relative;
      width: 76px;
      height: 76px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .image-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-preview .remove-img {
      position: absolute;
      top: 3px;
      right: 3px;
      background: rgba(0, 0, 0, 0.65);
      border: none;
      border-radius: 50%;
      width: 19px;
      height: 19px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
    }

    /* Tracking ID */
    .tracking-id {
      font-family: var(--mono);
      font-size: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--accent);
      letter-spacing: 1px;
      font-weight: 600;
    }

    /* ── Timeline ────────────────────────────────────────────────────── */
    .timeline {
      position: relative;
      padding-left: 26px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--border);
    }

    .timeline-item {
      position: relative;
      padding-bottom: 22px;
    }

    .timeline-item:last-child {
      padding-bottom: 0;
    }

    .timeline-dot {
      position: absolute;
      left: -26px;
      top: 5px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2.5px solid var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timeline-dot.done {
      background: var(--accent);
    }

    .timeline-dot.active {
      background: #3b82f6;
      animation: pulse 1.5s infinite;
    }

    .timeline-dot.pending {
      background: var(--border2);
    }

    .timeline-date {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 2px;
      font-family: var(--mono);
    }

    .timeline-title {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
    }

    .timeline-desc {
      font-size: 12.5px;
      color: var(--text2);
      margin-top: 3px;
    }

    /* ── Filters Bar ────────────────────────────────────────────────── */
    .filters-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap input {
      width: 100%;
      padding: 9px 14px 9px 38px;
      border: 1.5px solid var(--border2);
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: all var(--transition);
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 15px;
    }

    .filter-select {
      padding: 9px 12px;
      border: 1.5px solid var(--border2);
      border-radius: var(--radius-sm);
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: all var(--transition);
    }

    .filter-select:focus {
      border-color: var(--accent);
    }

    /* ── Modal ──────────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 680px;
      max-width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
      animation: scaleIn 0.25s ease;
    }

    .modal-header {
      padding: 22px 26px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
    }

    .modal-body {
      padding: 24px 26px;
    }

    .modal-footer {
      padding: 16px 26px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text2);
      font-size: 22px;
      padding: 4px 8px;
      border-radius: 8px;
      transition: all var(--transition);
    }

    .close-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    /* ── Spinner ─────────────────────────────────────────────────────── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .spinner-sm {
      width: 14px;
      height: 14px;
      border-width: 2px;
    }

    .spinner-dark {
      border-color: rgba(0, 0, 0, 0.12);
      border-top-color: var(--text2);
    }

    /* ── Empty State ─────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
    }

    .empty-icon {
      font-size: 52px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .empty-desc {
      font-size: 13px;
      color: var(--text2);
    }

    /* ── Chart ──────────────────────────────────────────────────────── */
    .chart-wrap {
      height: 260px;
      position: relative;
    }

    .chart-wrap-sm {
      height: 200px;
      position: relative;
    }

    /* ── Layout Helpers ─────────────────────────────────────────────── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .three-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
    }

    @media(max-width:1100px) {
      .three-col {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media(max-width:900px) {

      .two-col,
      .three-col {
        grid-template-columns: 1fr;
      }
    }

    .flex {
      display: flex;
    }

    .items-center {
      align-items: center;
    }

    .justify-between {
      justify-content: space-between;
    }

    .gap-2 {
      gap: 8px;
    }

    .gap-3 {
      gap: 12px;
    }

    .gap-4 {
      gap: 16px;
    }

    .ml-auto {
      margin-left: auto;
    }

    .mt-1 {
      margin-top: 4px;
    }

    .mt-2 {
      margin-top: 8px;
    }

    .mt-3 {
      margin-top: 16px;
    }

    .mt-4 {
      margin-top: 24px;
    }

    .mb-2 {
      margin-bottom: 8px;
    }

    .mb-3 {
      margin-bottom: 16px;
    }

    .text-muted {
      color: var(--text2);
      font-size: 13px;
    }

    .text-accent {
      color: var(--accent);
    }

    .text-admin {
      color: var(--admin-color);
    }

    .font-mono {
      font-family: var(--mono);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    .progress-bar {
      height: 6px;
      background: var(--surface3);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    .remark-item {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }

    .remark-meta {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
      font-family: var(--mono);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11.5px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    /* ── Districts Page ─────────────────────────────────────────────── */
    .district-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .district-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .district-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .district-card.expanded {
      border-color: var(--accent);
      background: rgba(20, 184, 166, 0.04);
    }

    .district-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .district-count {
      font-size: 11.5px;
      color: var(--text2);
      margin-top: 3px;
    }

    .mandal-list {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mandal-tag {
      background: var(--surface3);
      color: var(--text2);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
    }

    /* ── Profile ─────────────────────────────────────────────────────── */
    .profile-avatar-lg {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
    }

    /* ── Dark toggle ─────────────────────────────────────────────────── */
    .dark-toggle {
      background: var(--surface2);
      border: 1.5px solid var(--border2);
      border-radius: 99px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition);
      color: var(--text);
    }

    .dark-toggle:hover {
      border-color: var(--accent);
    }

    /* ── Success Page ────────────────────────────────────────────────── */
    .success-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 48px 40px;
      text-align: center;
      max-width: 540px;
      margin: 0 auto;
    }

    .success-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, rgba(20, 184, 166, 0.15), rgba(8, 145, 178, 0.15));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 20px;
    }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      :root {
        --sidebar-w: 280px;
      }

      .sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        bottom: 0;
        z-index: 100;
        transition: left 0.3s ease;
        box-shadow: var(--shadow-xl);
      }

      .sidebar.open {
        left: 0;
      }

      .overlay-bg {
        display: block;
      }

      .hamburger {
        display: flex;
        align-items: center;
      }

      .page-header {
        padding: 18px 20px;
      }

      .page-body {
        padding: 18px 20px;
      }

      .form-grid,
      .form-grid-3 {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .category-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .district-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* AI Analyser Box Styles */
    .ai-analyser-box {
      background: linear-gradient(135deg, rgba(20, 184, 166, 0.05), rgba(8, 145, 178, 0.08));
      border: 1.5px dashed rgba(20, 184, 166, 0.35);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 14px;
      transition: all var(--transition);
      animation: fadeIn 0.3s ease;
    }

    .ai-prompt-state {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .ai-sparkle-icon {
      font-size: 26px;
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, rgba(20, 184, 166, 0.15), rgba(8, 145, 178, 0.2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    .ai-analyzing-state {
      text-align: center;
      padding: 12px 0;
    }

    .ai-status-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin-top: 8px;
      font-family: var(--mono);
    }

    .ai-result-panel {
      animation: fadeIn 0.4s ease;
    }

    .ai-result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .ai-result-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #14b8a6, #0891b2);
      color: #fff;
      border-radius: 99px;
      font-size: 11.5px;
      font-weight: 700;
      padding: 4px 12px;
      letter-spacing: 0.3px;
    }

    .ai-result-grid {
      display: grid;
      gap: 8px;
    }

    .ai-result-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      background: var(--surface);
      border-radius: var(--radius-xs);
      padding: 10px 12px;
      border: 1px solid var(--border);
    }

    .ai-result-label {
      font-size: 10.5px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ai-result-value {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      line-height: 1.5;
    }

    .ai-result-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
      max-height: 80px;
      overflow-y: auto;
    }

    .ai-apply-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .ai-api-key-wrap {
      margin-bottom: 12px;
    }

    .ai-api-key-input {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid rgba(20, 184, 166, 0.35);
      border-radius: var(--radius-xs);
      font-size: 12.5px;
      background: var(--surface);
      color: var(--text);
      font-family: var(--mono);
      outline: none;
      transition: border-color var(--transition);
    }

    .ai-api-key-input:focus {
      border-color: var(--accent);
    }
  </style>

    // Call Gemini Vision API with the image
    async function analyzeImageWithGemini(base64Image, mimeType, apiKey) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      const prompt = `You are an AI assistant for a civic complaint management system in Telangana, India.
Analyze this image and identify the civic issue shown.

Respond ONLY with valid JSON in this exact format (no markdown, no explanation):
{
  "category": "<one of: roads, sanitation, water, electricity, drainage, parks, noise, buildings, transport, other>",
  "title": "<short precise title of the issue, max 12 words>",
  "description": "<detailed description starting with 'AI Visual Analysis:', explain what you see, the severity, impact on citizens, and recommended action — 3-4 sentences>",
  "priority": "<one of: low, medium, high, urgent>",
  "confidence": "<high, medium, or low>"
}`;

      const body = {
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: mimeType, data: base64Image } }
          ]
        }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 512 }
      };

      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err?.error?.message || `API error ${res.status}`);
      }

      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
      // Strip markdown code fences if present
      const clean = text.replace(/```json\n?|```/g, '').trim();
      return JSON.parse(clean);
    }

    // ─── Submit Complaint ─────────────────────────────────────────────────
    function SubmitComplaint({ setOpen }) {
      const { currentUser, addComplaint, showToast, setPage } = useApp();
      const [form, setForm] = useState({
        title: '', category: '', state: 'Telangana',
        district: currentUser.district || '', mandal: currentUser.mandal || '',
        area: '', description: '', priority: 'medium'
      });
      const [images, setImages] = useState([]);
      const [imageFiles, setImageFiles] = useState([]);
      const [submitted, setSubmitted] = useState(null);
      const [loading, setLoading] = useState(false);
      const fileRef = useRef();

      const [aiAnalyzing, setAiAnalyzing] = useState(false);
      const [aiStatus, setAiStatus] = useState('');
      const [aiProgress, setAiProgress] = useState(0);
      const [aiResult, setAiResult] = useState(null);
      const [aiError, setAiError] = useState('');
      const [geminiKey, setGeminiKey] = useState(() => localStorage.getItem(GEMINI_KEY_STORAGE) || '');
      const [showKeyInput, setShowKeyInput] = useState(false);

      const saveGeminiKey = (k) => {
        setGeminiKey(k);
        localStorage.setItem(GEMINI_KEY_STORAGE, k);
      };

      const detectCategoryFromName = (name) => {
        const n = name.toLowerCase();
        if (n.includes('pothole') || n.includes('road') || n.includes('tarmac') || n.includes('pavement') || n.includes('crack')) return 'roads';
        if (n.includes('garbage') || n.includes('waste') || n.includes('trash') || n.includes('dump') || n.includes('litter') || n.includes('sanit')) return 'sanitation';
        if (n.includes('water') || n.includes('leak') || n.includes('pipe') || n.includes('flood') || n.includes('tap')) return 'water';
        if (n.includes('light') || n.includes('pole') || n.includes('electric') || n.includes('power') || n.includes('bulb')) return 'electricity';
        if (n.includes('drain') || n.includes('sewage') || n.includes('clog') || n.includes('sewer')) return 'drainage';
        if (n.includes('park') || n.includes('bench') || n.includes('tree') || n.includes('slide') || n.includes('garden')) return 'parks';
        if (n.includes('noise') || n.includes('loud') || n.includes('sound')) return 'noise';
        if (n.includes('build') || n.includes('construct') || n.includes('wall') || n.includes('demolit')) return 'buildings';
        if (n.includes('bus') || n.includes('transport') || n.includes('traffic')) return 'transport';
        return null;
      };

      const runAiAnalysis = async () => {
        if (images.length === 0) return;
        setAiResult(null);
        setAiError('');
        setAiAnalyzing(true);
        setAiProgress(10);
        setAiStatus('🔍 Initializing Vision Model...');

        try {
          let result;

          if (geminiKey.trim()) {
            setAiProgress(25);
            setAiStatus('📤 Encoding image for Gemini...');
            await new Promise(r => setTimeout(r, 300));

            const fileObj = imageFiles[0];
            let base64Data, mimeType;
            if (fileObj) {
              const encoded = await fileToBase64(fileObj);
              base64Data = encoded.base64;
              mimeType = encoded.mimeType;
            } else {
              const dataUrl = images[0].url;
              mimeType = dataUrl.match(/data:([^;]+);/)?.[1] || 'image/jpeg';
              base64Data = dataUrl.split(',')[1];
            }

            setAiProgress(55);
            setAiStatus('🧠 Gemini Vision is analyzing your photo...');
            await new Promise(r => setTimeout(r, 200));

            result = await analyzeImageWithGemini(base64Data, mimeType, geminiKey.trim());

            setAiProgress(90);
            setAiStatus('📝 Building complaint details...');
            await new Promise(r => setTimeout(r, 300));

          } else {
            setAiProgress(30);
            setAiStatus('📡 Scanning image metadata...');
            await new Promise(r => setTimeout(r, 500));

            setAiProgress(65);
            setAiStatus('🧠 Detecting issue type...');
            await new Promise(r => setTimeout(r, 600));

            setAiProgress(85);
            setAiStatus('📝 Generating description...');
            await new Promise(r => setTimeout(r, 400));

            const detected = detectCategoryFromName(images[0].name) || form.category || 'roads';
            const fallback = AI_FALLBACK[detected] || AI_FALLBACK['other'];
            result = {
              category: detected,
              title: fallback.title,
              description: fallback.desc,
              priority: fallback.priority,
              confidence: 'medium',
              _isFallback: true
            };
          }

          const validCats = ['roads', 'sanitation', 'water', 'electricity', 'drainage', 'parks', 'noise', 'buildings', 'transport', 'other'];
          if (!validCats.includes(result.category)) result.category = 'other';
          if (!['low', 'medium', 'high', 'urgent'].includes(result.priority)) result.priority = 'medium';

          setAiProgress(100);
          setAiStatus('✅ Analysis complete!');
          setAiResult(result);
          await new Promise(r => setTimeout(r, 300));

        } catch (err) {
          setAiError(`AI analysis failed: ${err.message}. Check your API key or try again.`);
          showToast('❌ AI analysis failed. See error below.', 'error');
        } finally {
          setAiAnalyzing(false);
        }
      };

      const applyAiResult = () => {
        if (!aiResult) return;
        setForm(p => ({
          ...p,
          category: aiResult.category,
          title: aiResult.title,
          description: aiResult.description,
          priority: aiResult.priority
        }));
        setAiResult(null);
        showToast('🪄 AI analysis applied to your complaint form!', 'success');
      };

      const catInfo = CATEGORIES.find(c => c.id === form.category);
      const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

      const handleImages = e => {
        const files = Array.from(e.target.files);
        setImageFiles(prev => [...prev, ...files]);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = ev => setImages(prev => [...prev, { url: ev.target.result, name: file.name }]);
          reader.readAsDataURL(file);
        });
        setAiResult(null);
        setAiError('');
      };

      const removeImage = (idx) => {
        setImages(imgs => imgs.filter((_, j) => j !== idx));
        setImageFiles(files => files.filter((_, j) => j !== idx));
        setAiResult(null);
        setAiError('');
      };

      const handleSubmit = async e => {
        e.preventDefault();
        if (!form.category) { showToast('Please select a category', 'error'); return; }
        if (!form.district) { showToast('Please select a district', 'error'); return; }
        setLoading(true);
        await new Promise(r => setTimeout(r, 900));

        const descLower = form.description.toLowerCase();
        let priority = form.priority;
        const urgentKW = ['accident', 'dangerous', 'emergency', 'severe', 'critical', 'fire', 'flood', 'collapse', 'injury', 'urgent', 'fatal'];
        if (urgentKW.some(kw => descLower.includes(kw))) priority = 'urgent';

        const id = genId();
        const complaint = {
          id, ...form,
          userId: currentUser.id,
          assignedDept: catInfo?.dept || 'Municipal Corp',
          assignedOfficer: null,
          priority,
          status: 'Pending',
          images: images.map(i => i.url),
          remarks: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        };
        addComplaint(complaint);
        setSubmitted(complaint);
        showToast(`Complaint ${id} submitted! 🎉`, 'success');
        setLoading(false);
      };

      if (submitted) return (
        <div className="fade-in">
          <PageHeader title="Complaint Submitted ✅" sub="Your complaint has been registered" setOpen={setOpen} />
          <div className="page-body">
            <div className="success-card">
              <div className="success-icon">🎉</div>
              <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 8 }}>Complaint Registered!</div>
              <div className="text-muted mb-3">Save your tracking ID for future reference</div>
              <div className="tracking-id" style={{ display: 'inline-block', marginBottom: 24, fontSize: 18, padding: '10px 28px' }}>{submitted.id}</div>
              <div style={{ background: 'var(--surface2)', borderRadius: 'var(--radius-sm)', padding: '16px', marginBottom: 24, textAlign: 'left' }}>
                {[
                  ['Category', <CatBadge cat={submitted.category} />],
                  ['Department', submitted.assignedDept],
                  ['Location', `${submitted.district}${submitted.mandal ? ', ' + submitted.mandal : ''}${submitted.area ? ', ' + submitted.area : ''}`],
                  ['Priority', <PriorityBadge p={submitted.priority} />],
                  ['Status', <StatusBadge status="Pending" />],
                ].map(([k, v]) => (
                  <div key={k} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                    <span style={{ fontSize: 12, color: 'var(--text2)' }}>{k}</span>
                    <span style={{ fontSize: 13, fontWeight: 500 }}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
                <button className="btn btn-secondary" onClick={() => { setSubmitted(null); setForm({ title: '', category: '', state: 'Telangana', district: currentUser.district || '', mandal: currentUser.mandal || '', area: '', description: '', priority: 'medium' }); setImages([]); setImageFiles([]); }}>Submit Another</button>
                <button className="btn btn-primary" onClick={() => setPage('my-complaints')}>View My Complaints</button>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="fade-in">
          <PageHeader title="Report a Civic Issue" sub="Fill in the details to submit your complaint" setOpen={setOpen} />
          <div className="page-body">
            <form onSubmit={handleSubmit}>
              <div className="form-section">
                <div className="form-section-title">
                  <div className="fs-icon" style={{ background: 'rgba(20,184,166,0.1)' }}>🏷️</div>
                  Select Category *
                </div>
                <div className="category-grid">
                  {CATEGORIES.map(c => (
                    <div key={c.id} className={`cat-card ${form.category === c.id ? 'selected' : ''}`}
                      onClick={() => f('category', c.id)} id={`cat-${c.id}`}>
                      <div className="cat-icon">{c.icon}</div>
                      <div className="cat-name">{c.name}</div>
                      <div className="cat-dept">{c.dept}</div>
                    </div>
                  ))}
                </div>
                {form.category && (
                  <div style={{ marginTop: 14, padding: '10px 14px', background: 'rgba(20,184,166,0.07)', borderRadius: 'var(--radius-sm)', border: '1px solid rgba(20,184,166,0.2)', display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span>⚡</span>
                    <span style={{ fontSize: 13, color: 'var(--text2)' }}>Will be assigned to: <strong>{catInfo?.dept}</strong></span>
                  </div>
                )}
              </div>
              <div className="form-section">
                <div className="form-section-title">
                  <div className="fs-icon" style={{ background: 'rgba(59,130,246,0.1)' }}>📝</div>
                  Issue Details
                </div>
                <div className="form-group form-full">
                  <label className="form-label">Issue Title *</label>
                  <input className="form-input" id="complaint-title" placeholder="Brief description of the issue (e.g., Large pothole near market)"
                    value={form.title} onChange={e => f('title', e.target.value)} required />
                </div>
                <div className="form-group form-full">
                  <label className="form-label">Detailed Description *</label>
                  <textarea className="form-input" id="complaint-desc" placeholder="Describe the issue in detail. Include specific location landmarks, how long the issue has been present, and any safety concerns..."
                    value={form.description} onChange={e => f('description', e.target.value)} required style={{ minHeight: 120 }} />
                </div>
                <div className="form-group">
                  <label className="form-label">Priority Level</label>
                  <select className="form-input" id="complaint-priority" value={form.priority} onChange={e => f('priority', e.target.value)}>
                    <option value="low">🟢 Low — No immediate danger</option>
                    <option value="medium">🟡 Medium — Needs attention</option>
                    <option value="high">🔴 High — Serious issue</option>
                    <option value="urgent">🚨 Urgent — Immediate action required</option>
                  </select>
                </div>
              </div>
              <div className="form-section">
                <div className="form-section-title">
                  <div className="fs-icon" style={{ background: 'rgba(245,158,11,0.1)' }}>📍</div>
                  Location (District → Mandal → Street)
                </div>
                <LocationSelector
                  state={form.state} district={form.district}
                  mandal={form.mandal} area={form.area}
                  onChange={updates => setForm(p => ({ ...p, ...updates }))}
                  requireMandal={false}
                />
              </div>
              <div className="form-section">
                <div className="form-section-title">

                <div className="image-upload" onClick={() => fileRef.current?.click()} id="photo-upload-area">
                  <input ref={fileRef} type="file" accept="image/*" multiple onChange={handleImages} />

                  <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text)' }}>Click to upload photos</div>
                  <div style={{ fontSize: 12, color: 'var(--text2)', marginTop: 4 }}>PNG, JPG, WebP up to 10MB each</div>
                </div>
                {images.length > 0 && (

                    <div className="image-preview-grid">
                      {images.map((img, i) => (
                        <div key={i} className="image-preview">
                          <img src={img.url} alt={img.name} />
                          <button className="remove-img" onClick={e => { e.stopPropagation(); setImages(imgs => imgs.filter((_, j) => j !== i)); }}>✕</button>

                            <div className="progress-fill" style={{ width: `${aiProgress}%`, background: 'var(--accent)', height: '100%', transition: 'width 0.4s' }}></div>

                        </div>
                      ) : aiResult ? (
                        <div className="ai-result-panel">

                            <span style={{ fontSize: 20 }}>🤖</span>
                            <div>
                              <span className="ai-result-badge">
                                ✨ AI Analysis Complete
                                {aiResult.confidence && <span style={{ opacity: 0.8, marginLeft: 6 }}>· {aiResult.confidence} confidence</span>}

                              {aiResult._isFallback && (
                                <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 3 }}>
                                  ⚠️ Using keyword detection — add Gemini API key for real image analysis
                                </div>
                              )}
                            </div>
                          </div>
                          <div className="ai-result-grid">
                            <div className="ai-result-row" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                              <div>
                                <div className="ai-result-label">Category Detected</div>
                                <div className="ai-result-value">
                                  {CATEGORIES.find(c => c.id === aiResult.category)?.icon} {CATEGORIES.find(c => c.id === aiResult.category)?.name || aiResult.category}

                              </div>
                              <div>
                                <div className="ai-result-label">Recommended Priority</div>
                                <div className="ai-result-value" style={{ textTransform: 'capitalize' }}>
                                  {aiResult.priority === 'urgent' ? '🚨' : aiResult.priority === 'high' ? '🔴' : aiResult.priority === 'medium' ? '🟡' : '🟢'} {aiResult.priority}
                                </div>
                              </div>
                            </div>
                            <div className="ai-result-row">
                              <div className="ai-result-label">Generated Title</div>
                              <div className="ai-result-value">{aiResult.title}</div>
                            </div>
                            <div className="ai-result-row">
                              <div className="ai-result-label">Generated Description</div>
                              <div className="ai-result-desc">{aiResult.description}</div>
                            </div>
                          </div>
                          <div className="ai-apply-row">
                            <button type="button" className="btn btn-primary btn-sm" onClick={applyAiResult}
                              style={{ background: 'linear-gradient(135deg,#14b8a6,#0891b2)', border: 'none' }}>
                              ✅ Apply to Form
                            </button>
                            <button type="button" className="btn btn-ghost btn-sm" onClick={runAiAnalysis}>
                              🔄 Re-Analyze
                            </button>
                            <button type="button" className="btn btn-ghost btn-sm" onClick={() => setAiResult(null)} style={{ marginLeft: 'auto' }}>
                              ✕ Dismiss

                        </div>

                      ) : (
                        <div>
                          <div style={{ marginBottom: 12 }}>
                            <button type="button" onClick={() => setShowKeyInput(v => !v)}
                              style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, color: 'var(--text3)', padding: 0, display: 'flex', alignItems: 'center', gap: 4 }}>
                              🔑 {geminiKey ? '✅ Gemini API key saved (real AI enabled)' : 'Add Gemini API key for real image analysis'} {showKeyInput ? '▲' : '▼'}
                            </button>
                            {showKeyInput && (
                              <div style={{ marginTop: 8 }}>
                                <input
                                  className="ai-api-key-input"
                                  type="password"
                                  placeholder="Paste your Gemini API key (AIza...)"
                                  value={geminiKey}
                                  onChange={e => saveGeminiKey(e.target.value)}
                                  autoComplete="off"
                                />
                                <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 4 }}>
                                  Get a free key at <strong>aistudio.google.com</strong> → Create API Key. Saved in your browser only.
                                </div>
                              </div>
                            )}
                          </div>
                          {aiError && (
                            <div style={{ background: 'rgba(239,68,68,0.08)', border: '1px solid rgba(239,68,68,0.25)', borderRadius: 'var(--radius-xs)', padding: '8px 12px', fontSize: 12, color: '#ef4444', marginBottom: 10 }}>
                              {aiError}
                            </div>
                          )}
                          <div className="ai-prompt-state">
                            <div className="ai-sparkle-icon">🪄</div>
                            <div style={{ flex: 1, minWidth: '180px' }}>
                              <div style={{ fontWeight: 700, fontSize: 13.5, color: 'var(--text)' }}>
                                {geminiKey ? '🤖 Gemini Vision Ready' : '🪄 AI Auto-Fill Ready'}
                              </div>
                              <div style={{ fontSize: 11.5, color: 'var(--text2)', marginTop: 2 }}>
                                {geminiKey
                                  ? 'Gemini will look at your photo and generate the category, title, priority & description!'
                                  : 'Click Analyze to auto-fill complaint details from your photo. Add a Gemini key above for real image recognition.'}
                              </div>
                            </div>
                            <button type="button" className="btn btn-sm" onClick={runAiAnalysis}
                              style={{ background: 'linear-gradient(135deg,var(--accent),var(--accent2))', color: '#fff', border: 'none', fontWeight: 600, padding: '8px 16px', borderRadius: 'var(--radius-sm)', whiteSpace: 'nowrap' }}>
                              {geminiKey ? '🤖 Analyze with AI' : '🪄 Analyze Photo'}
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  </>
                )}
              </div>

              <button className="btn btn-primary" type="submit" id="submit-complaint-btn"
                style={{ padding: '13px 32px', fontSize: 15 }} disabled={loading}>
                {loading ? <><span className="spinner" /><span>Submitting...</span></> : '🚀 Submit Complaint'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ─── Track Complaint ─────────────────────────────────────────────────
    function TrackComplaint({ setOpen }) {
      const { complaints } = useApp();
      const [cid, setCid] = useState('');
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      const track = e => {
        e.preventDefault();
        const found = complaints.find(c => c.id.toUpperCase() === cid.trim().toUpperCase());
        if (found) { setResult(found); setError(''); }
        else { setResult(null); setError(`No complaint found with ID: ${cid.trim()}`); }
      };

      return (
        <div className="fade-in">
          <PageHeader title="Track Complaint" sub="Enter your complaint ID to check its status" setOpen={setOpen} />
          <div className="page-body">
            <div style={{ maxWidth: 560, margin: '0 auto' }}>
              <div className="card mb-3">
                <div className="card-body">
                  <form onSubmit={track} style={{ display: 'flex', gap: 10 }}>
                    <input className="form-input" id="track-input" placeholder="e.g. CMP-HYD001"
                      value={cid} onChange={e => setCid(e.target.value)} style={{ flex: 1, fontFamily: 'var(--mono)', letterSpacing: 1 }}
                      required />
                    <button className="btn btn-primary" type="submit" id="track-btn">Track</button>
                  </form>
                  {error && <div style={{ color: '#ef4444', marginTop: 10, fontSize: 13 }}>❌ {error}</div>}
                </div>
              </div>

              {result && (
                <div className="card fade-in">
                  <div className="card-header">
                    <div className="card-title">Complaint Details</div>
                    <span className="tracking-id">{result.id}</span>
                  </div>
                  <div className="card-body">
                    <div style={{ marginBottom: 16 }}>
                      <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>{result.title}</div>
                      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 10 }}>
                        <StatusBadge status={result.status} />
                        <PriorityBadge p={result.priority} />
                        <CatBadge cat={result.category} />
                      </div>
                      <div style={{ color: 'var(--text2)', fontSize: 13 }}>
                        📍 {result.district}{result.mandal && `, ${result.mandal}`}{result.area && `, ${result.area}`}
                      </div>
                    </div>

                    <div className="divider" />

                    {/* Timeline */}
                    <div style={{ marginBottom: 16 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14 }}>Status Timeline</div>
                      <div className="timeline">
                        {[
                          { status: 'Pending', done: true, label: 'Complaint Registered', desc: 'Your complaint has been received', date: result.createdAt },
                          { status: 'In Progress', done: result.status === 'In Progress' || result.status === 'Resolved', active: result.status === 'In Progress', label: 'Under Review', desc: 'Being investigated by field officer', date: result.status !== 'Pending' ? result.updatedAt : null },
                          { status: 'Resolved', done: result.status === 'Resolved', label: 'Resolved', desc: 'Issue has been fixed', date: result.status === 'Resolved' ? result.updatedAt : null },
                        ].map((step, i) => (
                          <div key={i} className="timeline-item">
                            <div className={`timeline-dot ${step.done ? 'done' : step.active ? 'active' : 'pending'}`} />
                            {step.date && <div className="timeline-date">{fmtDateTime(step.date)}</div>}
                            <div className="timeline-title">{step.label}</div>
                            <div className="timeline-desc">{step.desc}</div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {result.assignedDept && (
                      <div style={{ background: 'var(--surface2)', borderRadius: 'var(--radius-sm)', padding: '12px 14px', marginBottom: 16 }}>
                        <div style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 4 }}>Assigned Department</div>
                        <div style={{ fontWeight: 600 }}>🏢 {result.assignedDept}</div>
                      </div>
                    )}

                    {result.remarks?.length > 0 && (
                      <>
                        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>Admin Remarks</div>
                        {result.remarks.map((r, i) => (
                          <div key={i} className="remark-item">
                            <div style={{ fontSize: 13.5 }}>{r.text}</div>
                            <div className="remark-meta">— {r.author} · {fmtDateTime(r.at)}</div>
                          </div>
                        ))}
                      </>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

                  {initials}
                </div>
                <div style={{ fontSize: 20, fontWeight: 800 }}>{currentUser.name}</div>
                <div style={{ color: 'var(--text2)', fontSize: 13, marginTop: 4 }}>{currentUser.email}</div>
                <div style={{ marginTop: 8, display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>

                  {currentUser.mandal && <span className="tag">🏘️ {currentUser.mandal}</span>}
                </div>
              </div>
            </div>

            <div className="card">
