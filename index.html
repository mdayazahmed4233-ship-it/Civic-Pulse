    // ─── Admin Dashboard ─────────────────────────────────────────────────
    function AdminDashboard({ setOpen }) {
      const { complaints, users } = useApp();
      const total = complaints.length;
      const pending = complaints.filter(c => c.status === 'Pending').length;
      const progress = complaints.filter(c => c.status === 'In Progress').length;
      const resolved = complaints.filter(c => c.status === 'Resolved').length;
      const urgent = complaints.filter(c => c.priority === 'urgent' && c.status !== 'Resolved').length;
      const citizens = users.filter(u => u.role === 'citizen').length;
      const chartRef = useRef(); const chartInst = useRef();
      const distChartRef = useRef(); const distChartInst = useRef();

      useEffect(() => {
        if (!chartRef.current) return;
        if (chartInst.current) chartInst.current.destroy();
        const cats = CATEGORIES.map(c => ({ name: c.name, count: complaints.filter(x => x.category === c.id).length, color: c.color }));
        const nonZero = cats.filter(c => c.count > 0);
        chartInst.current = new Chart(chartRef.current, {
          type: 'doughnut',
          data: { labels: nonZero.map(c => c.name), datasets: [{ data: nonZero.map(c => c.count), backgroundColor: nonZero.map(c => c.color + 'cc'), borderWidth: 0, hoverOffset: 6 }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { family: 'Outfit', size: 11 }, padding: 10 } } } }
        });
        return () => chartInst.current?.destroy();
      }, [complaints.length]);

      useEffect(() => {
        if (!distChartRef.current) return;
        if (distChartInst.current) distChartInst.current.destroy();
        const distMap = {};
        complaints.filter(c => c.state === 'Telangana').forEach(c => { distMap[c.district] = (distMap[c.district] || 0) + 1; });
        const top8 = Object.entries(distMap).sort((a, b) => b[1] - a[1]).slice(0, 8);
        if (!top8.length) return;
        distChartInst.current = new Chart(distChartRef.current, {
          type: 'bar',
          data: { labels: top8.map(([d]) => d), datasets: [{ label: 'Complaints', data: top8.map(([, n]) => n), backgroundColor: 'rgba(20,184,166,0.7)', borderRadius: 6 }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } }, x: { grid: { display: false } } } }
        });
        return () => distChartInst.current?.destroy();
      }, [complaints.length]);

      return (
        <div className="fade-in">
          <PageHeader title="Admin Dashboard" sub="Real-time overview of all civic complaints in Telangana" setOpen={setOpen} />
          <div className="page-body">
            <div className="stats-grid">
              {[
                { label: 'Total Complaints', value: total, icon: '📋', color: '#3b82f6', bg: 'rgba(59,130,246,0.1)' },
                { label: 'Pending', value: pending, icon: '⏳', color: '#f59e0b', bg: 'rgba(245,158,11,0.1)' },
                { label: 'In Progress', value: progress, icon: '🔄', color: '#8b5cf6', bg: 'rgba(139,92,246,0.1)' },
                { label: 'Resolved', value: resolved, icon: '✅', color: '#14b8a6', bg: 'rgba(20,184,166,0.1)' },
                { label: 'Urgent Issues', value: urgent, icon: '🚨', color: '#ef4444', bg: 'rgba(239,68,68,0.1)' },
                { label: 'Citizens', value: citizens, icon: '👥', color: '#0891b2', bg: 'rgba(8,145,178,0.1)' },
              ].map(s => (
                <div key={s.label} className="stat-card">
                  <div className="stat-icon" style={{ background: s.bg }}><span>{s.icon}</span></div>
                  <div className="stat-value" style={{ color: s.color }}>{s.value}</div>
                  <div className="stat-label">{s.label}</div>
                  {s.label === 'Resolved' && total > 0 && (
                    <div className="stat-change">{Math.round(resolved / total * 100)}% resolution rate</div>
                  )}
                </div>
              ))}
            </div>

            <div className="two-col mb-3">
              <div className="card">
                <div className="card-header"><div className="card-title">By Category</div></div>
                <div className="card-body">
                  {complaints.length === 0
                    ? <div className="empty-state" style={{ padding: '30px 0' }}><div className="empty-icon">📊</div><div className="empty-title">No data</div></div>
                    : <div className="chart-wrap"><canvas ref={chartRef} /></div>}
                </div>
              </div>
              <div className="card">
                <div className="card-header"><div className="card-title">Top Districts (Telangana)</div></div>
                <div className="card-body">
                  {complaints.filter(c => c.state === 'Telangana').length === 0
                    ? <div className="empty-state" style={{ padding: '30px 0' }}><div className="empty-icon">📊</div><div className="empty-title">No data</div></div>
                    : <div className="chart-wrap"><canvas ref={distChartRef} /></div>}
                </div>
              </div>
            </div>

            <div className="card">
              <div className="card-header">
                <div className="card-title">Recent Complaints</div>
              </div>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>ID</th><th>Title</th><th>District</th><th>Mandal</th><th>Category</th><th>Status</th><th>Priority</th></tr></thead>
                  <tbody>
                    {complaints.slice(0, 8).map(c => (
                      <tr key={c.id}>
                        <td><span className="tracking-id" style={{ fontSize: 11, padding: '3px 8px' }}>{c.id}</span></td>
                        <td style={{ maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c.title}</td>
                        <td>{c.district}</td>
                        <td>{c.mandal || '—'}</td>
                        <td><CatBadge cat={c.category} /></td>
                        <td><StatusBadge status={c.status} /></td>
                        <td><PriorityBadge p={c.priority} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── All Complaints (Admin) ───────────────────────────────────────────
    function AllComplaints({ setOpen, urgentOnly = false }) {
      const { complaints, setComplaints, officers, showToast } = useApp();
      const [search, setSearch] = useState('');
      const [statusF, setStatusF] = useState('');
      const [catF, setCatF] = useState('');
      const [distF, setDistF] = useState('');
      const [prioF, setPrioF] = useState('');
      const [selected, setSelected] = useState(null);

      const filtered = complaints.filter(c => {
        if (urgentOnly && !(c.priority === 'urgent' && c.status !== 'Resolved')) return false;
        if (statusF && c.status !== statusF) return false;
        if (catF && c.category !== catF) return false;
        if (distF && c.district !== distF) return false;
        if (prioF && c.priority !== prioF) return false;
        if (search) {
          const s = search.toLowerCase();
          return c.title.toLowerCase().includes(s) || c.id.toLowerCase().includes(s) || c.district.toLowerCase().includes(s);
        }
        return true;
      });

      const districts = [...new Set(complaints.map(c => c.district))].sort();

      return (
        <div className="fade-in">
          <PageHeader
            title={urgentOnly ? '🚨 Urgent Issues' : '📋 All Complaints'}
            sub={`${filtered.length} complaint${filtered.length !== 1 ? 's' : ''} found`}
            setOpen={setOpen}
          />
          <div className="page-body">
            <div className="filters-bar">
              <div className="search-wrap">
                <span className="search-icon">🔍</span>
                <input id="admin-search" placeholder="Search by title, ID, district..." value={search} onChange={e => setSearch(e.target.value)} />
              </div>
              <select className="filter-select" id="admin-status-filter" value={statusF} onChange={e => setStatusF(e.target.value)}>
                <option value="">All Status</option>
                <option>Pending</option><option>In Progress</option><option>Resolved</option><option>Rejected</option>
              </select>
              <select className="filter-select" id="admin-cat-filter" value={catF} onChange={e => setCatF(e.target.value)}>
                <option value="">All Categories</option>
                {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
              </select>
              <select className="filter-select" id="admin-dist-filter" value={distF} onChange={e => setDistF(e.target.value)}>
                <option value="">All Districts</option>
                {TG_DISTRICT_LIST.map(d => <option key={d}>{d}</option>)}
              </select>
              <select className="filter-select" id="admin-prio-filter" value={prioF} onChange={e => setPrioF(e.target.value)}>
                <option value="">All Priority</option>
                <option value="urgent">🚨 Urgent</option>
                <option value="high">🔴 High</option>
                <option value="medium">🟡 Medium</option>
                <option value="low">🟢 Low</option>
              </select>
            </div>

            {filtered.length === 0 ? (
              <div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-title">No complaints found</div></div>
            ) : (
              <div className="card">
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>ID</th><th>Title</th><th>District</th><th>Mandal</th><th>Category</th><th>Status</th><th>Priority</th><th>Date</th><th>Action</th></tr></thead>
                    <tbody>
                      {filtered.map(c => (
                        <tr key={c.id} style={{ cursor: 'pointer' }} onClick={() => setSelected(c)}>
                          <td><span className="tracking-id" style={{ fontSize: 11, padding: '3px 8px' }}>{c.id}</span></td>
                          <td style={{ maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontWeight: 600 }}>{c.title}</td>
                          <td>{c.district}</td>
                          <td>{c.mandal || '—'}</td>
                          <td><CatBadge cat={c.category} /></td>
                          <td><StatusBadge status={c.status} /></td>
                          <td><PriorityBadge p={c.priority} /></td>
                          <td style={{ fontSize: 12, color: 'var(--text2)' }}>{fmtDate(c.createdAt)}</td>
                          <td onClick={e => e.stopPropagation()}>
                            <button className="btn btn-secondary btn-xs" onClick={() => setSelected(c)}>Manage</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
          {selected && <ComplaintDetailModal c={selected} onClose={() => setSelected(null)} isAdmin={true} />}
        </div>
      );
    }

    // ─── Complaint Detail Modal ────────────────────────────────────────────
    function ComplaintDetailModal({ c, onClose, isAdmin }) {
      const { complaints, setComplaints, officers, currentUser, showToast } = useApp();
      const [form, setForm] = useState({ status: c.status, priority: c.priority, assignedOfficer: c.assignedOfficer || null, remark: '' });
      const [saving, setSaving] = useState(false);

      const save = async () => {
        setSaving(true);
        await new Promise(r => setTimeout(r, 600));
        const remarks = form.remark.trim()
          ? [...(c.remarks || []), { id: Date.now(), text: form.remark.trim(), author: currentUser.name, at: new Date().toISOString() }]
          : c.remarks;
        const updated = { ...c, status: form.status, priority: form.priority, assignedOfficer: form.assignedOfficer, remarks, updatedAt: new Date().toISOString() };
        setComplaints(prev => prev.map(x => x.id === c.id ? updated : x));
        showToast('Complaint updated successfully', 'success');
        setSaving(false);
        onClose();
      };

      const deleteComplaint = () => {
        if (!confirm('Delete this complaint? This cannot be undone.')) return;
        setComplaints(prev => prev.filter(x => x.id !== c.id));
        showToast('Complaint deleted', 'info');
        onClose();
      };

      return (
        <div className="modal-backdrop" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="modal">
            <div className="modal-header">
              <div>
                <div className="modal-title">{c.title}</div>
                <span className="tracking-id" style={{ fontSize: 12, padding: '3px 10px' }}>{c.id}</span>
              </div>
              <button className="close-btn" onClick={onClose}>✕</button>
            </div>
            <div className="modal-body">
              {/* Status badges */}
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
                <StatusBadge status={c.status} />
                <PriorityBadge p={c.priority} />
                <CatBadge cat={c.category} />
              </div>

              {/* Location */}
              <div style={{ background: 'var(--surface2)', borderRadius: 'var(--radius-sm)', padding: '12px 14px', marginBottom: 14 }}>
                <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 4 }}>📍 Location</div>
                <div style={{ fontWeight: 600 }}>{c.district}{c.mandal && `, ${c.mandal}`}{c.area && `, ${c.area}`}, {c.state}</div>
              </div>

              {/* Description */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 12, color: 'var(--text3)', marginBottom: 6 }}>Description</div>
                <div style={{ fontSize: 13.5, lineHeight: 1.6, color: 'var(--text)' }}>{c.description}</div>
              </div>

              {/* Dept & Officer */}
              <div className="two-col mb-3" style={{ gap: 12 }}>
                <div style={{ background: 'var(--surface2)', borderRadius: 'var(--radius-sm)', padding: '12px 14px' }}>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 4 }}>🏢 Department</div>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{c.assignedDept || 'Unassigned'}</div>
                </div>
                <div style={{ background: 'var(--surface2)', borderRadius: 'var(--radius-sm)', padding: '12px 14px' }}>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 4 }}>👮 Officer</div>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{c.assignedOfficer ? (officers.find(o => o.id === c.assignedOfficer)?.name || c.assignedOfficer) : '—'}</div>
                </div>
              </div>

              {/* Images */}
              {c.images?.length > 0 && (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 12, color: 'var(--text3)', marginBottom: 8 }}>📸 Photos</div>
                  <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                    {c.images.map((img, i) => (
                      <div key={i} style={{ width: 80, height: 80, borderRadius: 10, overflow: 'hidden', border: '1px solid var(--border)' }}>
                        <img src={img} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Remarks */}
              {c.remarks?.length > 0 && (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 12, color: 'var(--text3)', marginBottom: 8 }}>💬 Remarks ({c.remarks.length})</div>
                  {c.remarks.map((r, i) => (
                    <div key={i} className="remark-item">
                      <div>{r.text}</div>
                      <div className="remark-meta">— {r.author} · {fmtDateTime(r.at)}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* Admin Controls */}
              {isAdmin && (
                <div style={{ borderTop: '1px solid var(--border)', paddingTop: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 12 }}>⚙️ Admin Controls</div>
                  <div className="form-grid mb-3" style={{ gap: 12 }}>
                    <div className="form-group">
                      <label className="form-label">Update Status</label>
                      <select className="form-input" value={form.status} onChange={e => setForm(p => ({ ...p, status: e.target.value }))}>
                        <option>Pending</option><option>In Progress</option><option>Resolved</option><option>Rejected</option>
                      </select>
                    </div>
                    <div className="form-group">
                      <label className="form-label">Priority</label>
                      <select className="form-input" value={form.priority} onChange={e => setForm(p => ({ ...p, priority: e.target.value }))}>
                        <option value="urgent">🚨 Urgent</option>
                        <option value="high">🔴 High</option>
                        <option value="medium">🟡 Medium</option>
                        <option value="low">🟢 Low</option>
                      </select>
                    </div>
                  </div>
                  <div className="form-group mb-3">
                    <label className="form-label">Assign Officer</label>
                    <select className="form-input" value={form.assignedOfficer || ''} onChange={e => setForm(p => ({ ...p, assignedOfficer: e.target.value ? Number(e.target.value) : null }))}>
                      <option value="">— Unassigned —</option>
                      {officers.filter(o => o.isActive).map(o => (
                        <option key={o.id} value={o.id}>{o.name} — {o.dept} ({o.district})</option>
                      ))}
                    </select>
                  </div>
                  <div className="form-group mb-3">
                    <label className="form-label">Add Remark</label>
                    <textarea className="form-input" placeholder="Add a note or update for this complaint..."
                      value={form.remark} onChange={e => setForm(p => ({ ...p, remark: e.target.value }))} style={{ minHeight: 80 }} />
                  </div>
                </div>
              )}
            </div>
            <div className="modal-footer">
              {isAdmin && <button className="btn btn-danger btn-sm" onClick={deleteComplaint}>🗑️ Delete</button>}
              <button className="btn btn-ghost" onClick={onClose}>Close</button>
              {isAdmin && <button className="btn btn-primary" onClick={save} disabled={saving}>
                {saving ? <span className="spinner" /> : '💾 Save Changes'}
              </button>}
            </div>
          </div>
        </div>
      );
    }

                      </div>
                      <div className="form-grid">
                        <div className="form-group">
                          <label className="form-label">District *</label>
                          <select className="form-input" value={form.district} onChange={e => setForm(p => ({ ...p, district: e.target.value, mandal: '' }))}>
                            {TG_DISTRICT_LIST.map(d => <option key={d}>{d}</option>)}
                          </select>
                        </div>
                        <div className="form-group">
                          <label className="form-label">Mandal</label>
                          <select className="form-input" value={form.mandal} onChange={e => setForm(p => ({ ...p, mandal: e.target.value }))}>
                            <option value="">Select Mandal</option>
                            {mandals.map(m => <option key={m}>{m}</option>)}
                          </select>
                        </div>
                      </div>
                      <div className="form-grid">
                        <div className="form-group">
                          <label className="form-label">Email</label>
                          <input className="form-input" type="email" value={form.email} onChange={e => setForm(p => ({ ...p, email: e.target.value }))} />
                        </div>
                        <div className="form-group">
                          <label className="form-label">Phone</label>
                          <input className="form-input" value={form.phone} onChange={e => setForm(p => ({ ...p, phone: e.target.value }))} />
                        </div>
                      </div>
                    </div>
                    <div className="modal-footer">
                      <button type="button" className="btn btn-ghost" onClick={() => setShowForm(false)}>Cancel</button>
                      <button type="submit" className="btn btn-primary">Add Officer</button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Departments Page ─────────────────────────────────────────────────
    function DepartmentsPage({ setOpen }) {
      const { departments, setDepartments, showToast } = useApp();
      const [showForm, setShowForm] = useState(false);
      const [form, setForm] = useState({ name: '', category: 'other', district: 'Hyderabad', state: 'Telangana', head: '', email: '', phone: '' });

      const addDept = e => {
        e.preventDefault();
        const newD = { id: Date.now(), ...form };
        setDepartments(prev => [...prev, newD]);
        showToast('Department added', 'success');
        setShowForm(false);
      };

      return (
        <div className="fade-in">
          <PageHeader title="Departments" sub={`${departments.length} departments`} setOpen={setOpen}
            actions={<button className="btn btn-primary btn-sm" onClick={() => setShowForm(true)}>➕ Add Department</button>} />
          <div className="page-body">
            <div className="three-col">
              {departments.map(d => (
                <div key={d.id} className="card">
                  <div className="card-body">
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
                      <span style={{ fontSize: 24 }}>{CATEGORIES.find(c => c.id === d.category)?.icon || '🏢'}</span>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>{d.name}</div>
                        <CatBadge cat={d.category} />
                      </div>
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, fontSize: 12, color: 'var(--text2)' }}>
                      {d.head && <div>👤 {d.head}</div>}
                      <div>📍 {d.district}, {d.state}</div>
                      {d.email && <div>📧 {d.email}</div>}
                      {d.phone && <div>📱 {d.phone}</div>}
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {showForm && (
              <div className="modal-backdrop" onClick={e => { if (e.target === e.currentTarget) setShowForm(false); }}>
                <div className="modal" style={{ maxWidth: 520 }}>
                  <div className="modal-header">
                    <div className="modal-title">Add New Department</div>
                    <button className="close-btn" onClick={() => setShowForm(false)}>✕</button>
                  </div>
                  <form onSubmit={addDept}>
                    <div className="modal-body">
                      <div className="form-group">
                        <label className="form-label">Department Name *</label>
                        <input className="form-input" value={form.name} onChange={e => setForm(p => ({ ...p, name: e.target.value }))} required />
                      </div>
                      <div className="form-grid">
                        <div className="form-group">
                          <label className="form-label">Category</label>
                          <select className="form-input" value={form.category} onChange={e => setForm(p => ({ ...p, category: e.target.value }))}>
                            {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
                          </select>
                        </div>
                        <div className="form-group">
                          <label className="form-label">District</label>
                          <select className="form-input" value={form.district} onChange={e => setForm(p => ({ ...p, district: e.target.value }))}>
                            {TG_DISTRICT_LIST.map(d => <option key={d}>{d}</option>)}
                          </select>
                        </div>
                      </div>
                      <div className="form-group">
                        <label className="form-label">Department Head</label>
                        <input className="form-input" value={form.head} onChange={e => setForm(p => ({ ...p, head: e.target.value }))} />
                      </div>
                      <div className="form-grid">
                        <div className="form-group">
                          <label className="form-label">Email</label>
                          <input className="form-input" type="email" value={form.email} onChange={e => setForm(p => ({ ...p, email: e.target.value }))} />
                        </div>
                        <div className="form-group">
                          <label className="form-label">Phone</label>
                          <input className="form-input" value={form.phone} onChange={e => setForm(p => ({ ...p, phone: e.target.value }))} />
                        </div>
                      </div>
                    </div>
                    <div className="modal-footer">
                      <button type="button" className="btn btn-ghost" onClick={() => setShowForm(false)}>Cancel</button>
                      <button type="submit" className="btn btn-primary">Add Department</button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Users Page ───────────────────────────────────────────────────────
    function UsersPage({ setOpen }) {
      const { users, setUsers, showToast } = useApp();
      const [search, setSearch] = useState('');
      const citizens = users.filter(u => u.role === 'citizen' && (!search || u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase())));

      const toggle = u => {
        setUsers(prev => prev.map(x => x.id === u.id ? { ...x, isActive: !x.isActive } : x));
        showToast(`${u.name} ${u.isActive ? 'deactivated' : 'activated'}`, 'info');
      };
      const del = u => {
        if (!confirm(`Delete ${u.name}?`)) return;
        setUsers(prev => prev.filter(x => x.id !== u.id));
        showToast('User deleted', 'info');
      };

      return (
        <div className="fade-in">
          <PageHeader title="Citizen Management" sub={`${citizens.length} citizens registered`} setOpen={setOpen} />
          <div className="page-body">
            <div className="filters-bar">
              <div className="search-wrap">
                <span className="search-icon">🔍</span>
                <input id="users-search" placeholder="Search users..." value={search} onChange={e => setSearch(e.target.value)} />
              </div>
            </div>
            <div className="card">
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>District</th><th>Mandal</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead>
                  <tbody>
                    {citizens.map(u => (
                      <tr key={u.id}>
                        <td style={{ fontWeight: 600 }}>{u.name}</td>
                        <td style={{ fontSize: 12, color: 'var(--text2)' }}>{u.email}</td>
                        <td>{u.phone || '—'}</td>
                        <td>{u.district || '—'}</td>
                        <td>{u.mandal || '—'}</td>
                        <td style={{ fontSize: 12, color: 'var(--text2)' }}>{fmtDate(u.createdAt)}</td>
                        <td>
                          <span className={`badge ${u.isActive ? 'badge-resolved' : 'badge-rejected'}`}>
                            {u.isActive ? '✅ Active' : '❌ Inactive'}
                          </span>
                        </td>
                        <td>
                          <div style={{ display: 'flex', gap: 6 }}>
                            <button className="btn btn-secondary btn-xs" onClick={() => toggle(u)}>
                              {u.isActive ? 'Deactivate' : 'Activate'}
                            </button>
                            <button className="btn btn-danger btn-xs" onClick={() => del(u)}>Delete</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Analytics Page ───────────────────────────────────────────────────
    function AnalyticsPage({ setOpen }) {
      const { complaints } = useApp();
      const monthlyRef = useRef(); const monthlyInst = useRef();
      const catRef = useRef(); const catInst = useRef();
      const distRef = useRef(); const distInst = useRef();

      useEffect(() => {
        // Monthly chart
        if (!monthlyRef.current) return;
        if (monthlyInst.current) monthlyInst.current.destroy();
        const monthly = {};
        complaints.forEach(c => {
          const d = new Date(c.createdAt);
          const key = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
          if (!monthly[key]) monthly[key] = { total: 0, resolved: 0 };
          monthly[key].total++;
          if (c.status === 'Resolved') monthly[key].resolved++;
        });
        const keys = Object.keys(monthly);
        monthlyInst.current = new Chart(monthlyRef.current, {
          type: 'bar',
          data: {
            labels: keys,
            datasets: [
              { label: 'Total', data: keys.map(k => monthly[k].total), backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 6 },
              { label: 'Resolved', data: keys.map(k => monthly[k].resolved), backgroundColor: 'rgba(20,184,166,0.7)', borderRadius: 6 },
            ]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true }, x: { grid: { display: false } } } }
        });
        return () => monthlyInst.current?.destroy();
      }, [complaints.length]);

      useEffect(() => {
        if (!catRef.current) return;
        if (catInst.current) catInst.current.destroy();
        const cats = CATEGORIES.map(c => ({ name: c.name, count: complaints.filter(x => x.category === c.id).length, color: c.color })).filter(c => c.count > 0);
        catInst.current = new Chart(catRef.current, {
          type: 'polarArea',
          data: { labels: cats.map(c => c.name), datasets: [{ data: cats.map(c => c.count), backgroundColor: cats.map(c => c.color + '99') }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { family: 'Outfit', size: 11 }, padding: 10 } } } }
        });
        return () => catInst.current?.destroy();
      }, [complaints.length]);

      useEffect(() => {
        if (!distRef.current) return;
        if (distInst.current) distInst.current.destroy();
        const dists = {};
        complaints.filter(c => c.state === 'Telangana').forEach(c => { dists[c.district] = (dists[c.district] || 0) + 1; });
        const top10 = Object.entries(dists).sort((a, b) => b[1] - a[1]).slice(0, 10);
        if (!top10.length) return;
        distInst.current = new Chart(distRef.current, {
          type: 'bar',
          data: { labels: top10.map(([d]) => d), datasets: [{ label: 'Complaints', data: top10.map(([, n]) => n), backgroundColor: 'rgba(99,102,241,0.7)', borderRadius: 6 }] },
          options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true }, y: { grid: { display: false } } } }
        });
        return () => distInst.current?.destroy();
      }, [complaints.length]);

      const resRate = complaints.length ? Math.round(complaints.filter(c => c.status === 'Resolved').length / complaints.length * 100) : 0;

      return (
        <div className="fade-in">
          <PageHeader title="Analytics" sub="Complaint trends and performance metrics" setOpen={setOpen} />
          <div className="page-body">
            <div className="stats-grid" style={{ marginBottom: 24 }}>
              {[
                { label: 'Resolution Rate', value: `${resRate}%`, color: '#14b8a6' },
                { label: 'Avg Response', value: '2.3d', color: '#3b82f6' },
                { label: 'Districts Active', value: [...new Set(complaints.map(c => c.district))].length, color: '#8b5cf6' },
                { label: 'Mandals Covered', value: [...new Set(complaints.filter(c => c.mandal).map(c => c.mandal))].length, color: '#f59e0b' },
              ].map(s => (
                <div key={s.label} className="stat-card">
                  <div className="stat-value" style={{ color: s.color, fontSize: 26 }}>{s.value}</div>
                  <div className="stat-label">{s.label}</div>
                </div>
              ))}
            </div>

            <div className="card mb-3">
              <div className="card-header"><div className="card-title">Monthly Trends</div></div>
              <div className="card-body">
                {complaints.length === 0
                  ? <div className="empty-state" style={{ padding: '30px 0' }}><div className="empty-icon">📈</div><div className="empty-title">No data</div></div>
                  : <div className="chart-wrap" style={{ height: 280 }}><canvas ref={monthlyRef} /></div>}
              </div>
            </div>

            <div className="two-col">
              <div className="card">
                <div className="card-header"><div className="card-title">Category Distribution</div></div>
                <div className="card-body">
                  {complaints.length === 0
                    ? <div className="empty-state" style={{ padding: '30px 0' }}><div className="empty-icon">📊</div><div className="empty-title">No data</div></div>
                    : <div className="chart-wrap"><canvas ref={catRef} /></div>}
                </div>
              </div>
              <div className="card">
                <div className="card-header"><div className="card-title">Top Districts</div></div>
                <div className="card-body">
                  {complaints.filter(c => c.state === 'Telangana').length === 0
                    ? <div className="empty-state" style={{ padding: '30px 0' }}><div className="empty-icon">📊</div><div className="empty-title">No data</div></div>
                    : <div className="chart-wrap"><canvas ref={distRef} /></div>}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Districts & Mandals Page ─────────────────────────────────────────
    function DistrictsPage({ setOpen }) {
      const [search, setSearch] = useState('');
      const [expanded, setExpanded] = useState(null);

      const filtered = TG_DISTRICT_LIST.filter(d => d.toLowerCase().includes(search.toLowerCase()));
      const totalMandals = TG_DISTRICT_LIST.reduce((a, d) => a + getMandals(d).length, 0);

      return (
        <div className="fade-in">
          <PageHeader title="Telangana Districts & Mandals" sub={`All 33 districts with ${totalMandals} mandals`} setOpen={setOpen} />
          <div className="page-body">
            <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
              <div style={{ background: 'rgba(20,184,166,0.1)', borderRadius: 'var(--radius-sm)', border: '1px solid rgba(20,184,166,0.2)', padding: '12px 18px' }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--accent)' }}>{TG_DISTRICT_LIST.length}</div>
                <div style={{ fontSize: 12, color: 'var(--text2)' }}>Total Districts</div>
              </div>
              <div style={{ background: 'rgba(99,102,241,0.1)', borderRadius: 'var(--radius-sm)', border: '1px solid rgba(99,102,241,0.2)', padding: '12px 18px' }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--admin-color)' }}>{totalMandals}</div>
                <div style={{ fontSize: 12, color: 'var(--text2)' }}>Total Mandals</div>
              </div>
            </div>

            <div className="filters-bar" style={{ marginBottom: 16 }}>
              <div className="search-wrap">
                <span className="search-icon">🔍</span>
                <input id="district-search" placeholder="Search districts..." value={search} onChange={e => setSearch(e.target.value)} />
              </div>
            </div>

            <div className="district-grid">
              {filtered.map(d => {
                const mandals = getMandals(d);
                const isExp = expanded === d;
                return (
                  <div key={d} className={`district-card ${isExp ? 'expanded' : ''}`} onClick={() => setExpanded(isExp ? null : d)}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <div>
                        <div className="district-name">📍 {d}</div>
                        <div className="district-count">{mandals.length} mandals</div>
                      </div>
                      <span style={{ color: 'var(--text3)', fontSize: 18, transition: 'transform 0.2s', transform: isExp ? 'rotate(90deg)' : 'none' }}>›</span>
                    </div>
                    {isExp && (
                      <div className="mandal-list">
                        {mandals.map(m => <span key={m} className="mandal-tag">{m}</span>)}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ─── App Root ─────────────────────────────────────────────────────────
    function App() {
      const [users, setUsers] = useState(INIT_USERS);
      const [complaints, setComplaints] = useState(INIT_COMPLAINTS);
      const [officers, setOfficers] = useState(INIT_OFFICERS);
      const [departments, setDepartments] = useState(INIT_DEPTS);
      const [currentUser, setCurrentUser] = useState(null);
      const [page, setPage] = useState('dashboard');
      const [dark, setDark] = useState(() => localStorage.getItem('civicpulse-dark') === 'true');
      const [toasts, setToasts] = useState([]);
      const [sidebarOpen, setSidebarOpen] = useState(false);

      useEffect(() => {
        if (dark) document.documentElement.setAttribute('data-dark', '');
        else document.documentElement.removeAttribute('data-dark');
        localStorage.setItem('civicpulse-dark', dark);
      }, [dark]);

      const showToast = useCallback((msg, type = 'info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
      }, []);

      const addUser = useCallback(u => setUsers(p => [...p, u]), []);
      const addComplaint = useCallback(c => setComplaints(p => [c, ...p]), []);

      // Default page per role
      useEffect(() => {
        if (currentUser) setPage(currentUser.role === 'admin' ? 'admin-dashboard' : 'dashboard');
      }, [currentUser?.id]);

      const ctx = {
        users, setUsers, complaints, setComplaints, officers, setOfficers,
        departments, setDepartments, currentUser, setCurrentUser,
        page, setPage, dark, setDark, showToast, addUser, addComplaint
      };

      const renderPage = () => {
        const isAdmin = currentUser.role === 'admin';
        switch (page) {
          case 'dashboard': return <CitizenDashboard setOpen={setSidebarOpen} />;
          case 'submit': return <SubmitComplaint setOpen={setSidebarOpen} />;
          case 'my-complaints': return <MyComplaints setOpen={setSidebarOpen} />;
          case 'track': return <TrackComplaint setOpen={setSidebarOpen} />;
          case 'profile': return <ProfilePage setOpen={setSidebarOpen} />;
          case 'admin-dashboard': return <AdminDashboard setOpen={setSidebarOpen} />;
          case 'all-complaints': return <AllComplaints setOpen={setSidebarOpen} />;
          case 'urgent': return <AllComplaints setOpen={setSidebarOpen} urgentOnly />;
          case 'officers': return <OfficersPage setOpen={setSidebarOpen} />;
          case 'departments': return <DepartmentsPage setOpen={setSidebarOpen} />;
          case 'users': return <UsersPage setOpen={setSidebarOpen} />;
          case 'analytics': return <AnalyticsPage setOpen={setSidebarOpen} />;
          case 'districts': return isAdmin ? <DistrictsPage setOpen={setSidebarOpen} /> : <CitizenDashboard setOpen={setSidebarOpen} />;
          default: return isAdmin ? <AdminDashboard setOpen={setSidebarOpen} /> : <CitizenDashboard setOpen={setSidebarOpen} />;
        }
      };

      return (
        <AppCtx.Provider value={ctx}>
          {!currentUser ? (
            <AuthPage />
          ) : (
            <div className="app-layout">
              <Sidebar open={sidebarOpen} setOpen={setSidebarOpen} />
              <div className="main">
                {renderPage()}
              </div>
            </div>
          )}
          <ToastContainer toasts={toasts} />
        </AppCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
